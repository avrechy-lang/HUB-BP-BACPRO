<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub Maths &amp; Sciences</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* =========================================================================
   THEME — fond clair uniquement, fort contraste, lisible sur téléphone
   ========================================================================= */
:root{
  --bg:        #eef2f7;
  --grid:      rgba(20,35,59,0.05);
  --surface:   #ffffff;
  --ink:       #16233a;   /* texte principal */
  --ink-soft:  #5a6675;   /* texte secondaire */
  --line:      #dde4ee;   /* bordures */
  --navy:      #16233a;
  --shadow:    0 1px 2px rgba(22,35,58,.06), 0 8px 24px rgba(22,35,58,.07);
  --shadow-hi: 0 2px 4px rgba(22,35,58,.08), 0 16px 36px rgba(22,35,58,.13);
  /* accents par catégorie (teintes claires) */
  --cours:   #2f6fed;  --cours-bg:   #e7eefc;
  --qcm:     #d9850a;  --qcm-bg:     #fbeed3;
  --exos:    #18966c;  --exos-bg:    #def2ea;
  --videos:  #db4e38;  --videos-bg:  #fbe6e0;
  --radius: 16px;
}

*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Hanken Grotesk', Arial, sans-serif;
  color:var(--ink);
  background-color:var(--bg);
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size:28px 28px;
  min-height:100vh;
  line-height:1.45;
  -webkit-font-smoothing:antialiased;
}

.wrap{max-width:980px;margin:0 auto;padding:22px 18px 64px}

/* ---------- En-tête ---------- */
header.top{
  display:flex;align-items:center;gap:14px;
  padding:14px 0 22px;
}
.logo{
  width:46px;height:46px;flex:0 0 auto;border-radius:12px;
  background:var(--navy);color:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow);
}
.logo svg{width:24px;height:24px}
.title h1{
  font-family:'Archivo', Arial, sans-serif;font-weight:800;
  font-size:clamp(22px,5.4vw,30px);letter-spacing:-.02em;line-height:1.05;
}
.title p{color:var(--ink-soft);font-size:14px;font-weight:500;margin-top:2px}

/* ---------- Fil d'ariane ---------- */
.crumbs{
  display:flex;flex-wrap:wrap;align-items:center;gap:6px;
  font-size:14px;font-weight:600;color:var(--ink-soft);
  margin-bottom:18px;min-height:22px;
}
.crumbs button{
  background:none;border:none;cursor:pointer;font:inherit;color:var(--cours);
  padding:4px 2px;border-radius:6px;
}
.crumbs button:hover{text-decoration:underline}
.crumbs .sep{opacity:.5}
.crumbs .here{color:var(--ink)}

/* ---------- Grilles de tuiles ---------- */
.grid{display:grid;gap:14px}
.grid.sections{grid-template-columns:repeat(2,1fr)}
.grid.duo{grid-template-columns:repeat(2,1fr)}
.grid.cats{grid-template-columns:repeat(2,1fr)}
@media(min-width:680px){
  .grid.sections{grid-template-columns:repeat(3,1fr)}
  .grid.cats{grid-template-columns:repeat(4,1fr)}
}

/* ---------- Tuile générique ---------- */
.tile{
  position:relative;display:flex;flex-direction:column;gap:12px;
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px 16px;min-height:118px;cursor:pointer;text-align:left;
  font:inherit;color:var(--ink);width:100%;
  box-shadow:var(--shadow);transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
  animation:rise .42s cubic-bezier(.22,.61,.36,1) backwards;
}
.tile:hover{transform:translateY(-3px);box-shadow:var(--shadow-hi);border-color:#cdd7e6}
.tile:active{transform:translateY(-1px)}
.tile .chip{
  width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  background:var(--cours-bg);color:var(--cours);
}
.tile .chip svg{width:23px;height:23px}
.tile .name{font-family:'Archivo',Arial,sans-serif;font-weight:700;font-size:17px;letter-spacing:-.01em}
.tile .meta{font-size:13px;color:var(--ink-soft);font-weight:500;margin-top:-4px}
.tile .arrow{position:absolute;top:16px;right:16px;color:#c2ccda;transition:transform .16s ease,color .16s}
.tile:hover .arrow{transform:translateX(3px);color:var(--ink-soft)}
.tile .badge{
  position:absolute;top:14px;right:14px;min-width:24px;height:24px;padding:0 7px;
  border-radius:12px;background:var(--qcm-bg);color:var(--qcm);
  font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;
}

/* couleurs par catégorie */
.tile.c-cours  .chip{background:var(--cours-bg); color:var(--cours)}
.tile.c-qcm    .chip{background:var(--qcm-bg);   color:var(--qcm)}
.tile.c-exos   .chip{background:var(--exos-bg);  color:var(--exos)}
.tile.c-videos .chip{background:var(--videos-bg);color:var(--videos)}

/* ---------- Liste de liens ---------- */
.list{display:flex;flex-direction:column;gap:10px}
a.link{
  display:flex;align-items:center;gap:14px;text-decoration:none;color:var(--ink);
  background:var(--surface);border:1px solid var(--line);border-radius:13px;
  padding:15px 16px;box-shadow:var(--shadow);
  transition:transform .14s ease, box-shadow .14s ease, border-color .14s;
  animation:rise .42s cubic-bezier(.22,.61,.36,1) backwards;
}
a.link:hover{transform:translateY(-2px);box-shadow:var(--shadow-hi);border-color:#cdd7e6}
a.link .dot{width:38px;height:38px;border-radius:10px;flex:0 0 auto;display:flex;align-items:center;justify-content:center}
a.link .lname{font-weight:600;font-size:16px;flex:1}
a.link .ext{color:#c2ccda}
a.link:hover .ext{color:var(--ink-soft)}

/* ---------- État vide ---------- */
.empty{
  border:2px dashed #cdd7e6;border-radius:14px;padding:26px 18px;text-align:center;
  color:var(--ink-soft);background:rgba(255,255,255,.5);
}
.empty strong{display:block;color:var(--ink);font-weight:700;margin-bottom:4px;font-family:'Archivo',Arial,sans-serif}
.empty code{background:#eef2f7;border:1px solid var(--line);border-radius:6px;padding:2px 6px;font-size:13px}

/* ---------- Pied ---------- */
footer.foot{
  margin-top:40px;padding-top:18px;border-top:1px solid var(--line);
  font-size:13px;color:var(--ink-soft);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;
}

@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="logo" id="logo" role="button" tabindex="0" aria-label="Accueil">
      <!-- éclair = clin d'œil Groupement 2 électricité -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="currentColor" stroke="none"/></svg>
    </div>
    <div class="title">
      <h1 id="hub-title">Hub Maths &amp; Sciences</h1>
      <p id="hub-sub">BTP CFA — choisis ton niveau</p>
    </div>
  </header>

  <nav class="crumbs" id="crumbs" aria-label="Fil d'ariane"></nav>
  <main id="app"></main>
</div>

<script src="data.js"></script>
<script>
/* =========================================================================
   COMMENT MODIFIER CE HUB
   -------------------------------------------------------------------------
   1) Pour changer le titre : modifie CONFIG.titre et CONFIG.sousTitre.
   2) Pour AJOUTER UN LIEN : va dans CONFIG.liens et ajoute une ligne
      { nom:"Texte du bouton", url:"https://..." }
      sous la bonne clé "niveau/matiere/categorie".
      Clés possibles : niveau = 2nde | 1ere | term | bp
                       matiere = maths | sciences
                       categorie = cours | qcm | exos | videos
      Exemple : "1ere/sciences/qcm": [ {nom:"Kahoot Loi d'Ohm", url:"https://..."} ]
   3) Pour AJOUTER UN NIVEAU (ex. CAP) : ajoute une ligne dans CONFIG.niveaux.
   4) Banque de ressources / Archives : remplis le tableau "liens" de CONFIG.libres.
   Tout le reste (boutons, mise en page) se génère tout seul.
   ========================================================================= */

const CONFIG = {
  titre: "Hub Maths & Sciences",
  sousTitre: "BTP CFA — choisis ton niveau",

  niveaux: [
    { id:"2nde", nom:"Seconde Bac Pro" },
    { id:"1ere", nom:"Première Bac Pro" },
    { id:"term", nom:"Terminale Bac Pro" },
    { id:"bp",   nom:"BP" }
    // { id:"cap", nom:"CAP" }   <-- décommente cette ligne pour ajouter le CAP
  ],

  matieres: [
    { id:"maths",    nom:"Maths" },
    { id:"sciences", nom:"Sciences" }
  ],

  categories: [
    { id:"cours",  nom:"Cours" },
    { id:"qcm",    nom:"QCM" },
    { id:"exos",   nom:"Exos" },
    { id:"videos", nom:"Vidéos" }
  ],

  // Sections libres chargées depuis data.js
  libres: (window.HUB_DATA && window.HUB_DATA.libres) ? window.HUB_DATA.libres : [],

  // Liens chargés depuis data.js
  liens: (window.HUB_DATA && window.HUB_DATA.liens) ? window.HUB_DATA.liens : {}
};

/* ---------- Icônes (SVG inline, sans dépendance) ---------- */
const I = {
  level:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>',
  bank :'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="5" rx="1.5"/><path d="M5 9v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V9"/><path d="M10 13h4"/></svg>',
  archive:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="5" rx="1.5"/><path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8"/><path d="M9.5 12h5"/></svg>',
  maths:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 7h8"/><path d="M8 12h2M14 12h2M11 11l2 2M13 11l-2 2"/><path d="M8 17h8"/></svg>',
  sciences:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6"/><path d="M10 3v6l-5 9a2 2 0 0 0 1.8 3h10.4a2 2 0 0 0 1.8-3l-5-9V3"/><path d="M7.5 15h9"/></svg>',
  cours:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5a2 2 0 0 1 2-2h11v16H6a2 2 0 0 0-2 2z"/><path d="M17 3h1a2 2 0 0 1 2 2v16"/></svg>',
  qcm:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="m8 9 2 2 3-3"/><path d="M8 16h8"/></svg>',
  exos:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>',
  videos:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m10 9 5 3-5 3z"/></svg>',
  arrow:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>',
  ext:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7"/><path d="M8 7h9v9"/></svg>'
};
const catIcon = {cours:I.cours, qcm:I.qcm, exos:I.exos, videos:I.videos};

/* ---------- État & utilitaires ---------- */
let state = { view:"home", niveau:null, matiere:null, cat:null, libre:null };
const $ = id => document.getElementById(id);
const nom = (list,id)=> (list.find(x=>x.id===id)||{}).nom || id;
const liensDe = (n,m,c)=> CONFIG.liens[`${n}/${m}/${c}`] || [];
const libreDe = id => (CONFIG.libres.find(x=>x.id===id)||{liens:[]});

function go(partial){ state = Object.assign({view:"home",niveau:null,matiere:null,cat:null,libre:null}, partial); render(); window.scrollTo({top:0,behavior:"smooth"}); }

/* ---------- Rendu ---------- */
function render(){
  $("hub-title").textContent = CONFIG.titre;
  $("hub-sub").textContent   = CONFIG.sousTitre;
  renderCrumbs();
  const app = $("app");
  if(state.view==="home")      app.innerHTML = viewHome();
  else if(state.view==="niveau")   app.innerHTML = viewNiveau();
  else if(state.view==="matiere")  app.innerHTML = viewMatiere();
  else if(state.view==="cat")      app.innerHTML = viewCat();
  else if(state.view==="libre")    app.innerHTML = viewLibre();
}

function renderCrumbs(){
  const c = $("crumbs"); let html = "";
  const seg = (label,data,here)=> here
     ? `<span class="here">${label}</span>`
     : `<button data-go="${data}">${label}</button>`;
  if(state.view==="home"){ c.innerHTML=""; return; }
  html += seg("Accueil","home");
  if(state.libre){ html += sep()+seg(nom(CONFIG.libres,state.libre),"",true); }
  if(state.niveau){
    const niveauHere = state.view==="niveau";
    html += sep()+ (niveauHere?`<span class="here">${nom(CONFIG.niveaux,state.niveau)}</span>`
                              :`<button data-go="niveau:${state.niveau}">${nom(CONFIG.niveaux,state.niveau)}</button>`);
  }
  if(state.matiere){
    const matHere = state.view==="matiere";
    html += sep()+ (matHere?`<span class="here">${nom(CONFIG.matieres,state.matiere)}</span>`
                           :`<button data-go="matiere:${state.niveau}:${state.matiere}">${nom(CONFIG.matieres,state.matiere)}</button>`);
  }
  if(state.cat){ html += sep()+`<span class="here">${nom(CONFIG.categories,state.cat)}</span>`; }
  c.innerHTML = html;
}
const sep = ()=>`<span class="sep">›</span>`;

function tile({go,cls,icon,name,meta,badge}){
  const arrow = badge!=null ? `<span class="badge">${badge}</span>` : `<span class="arrow">${I.arrow}</span>`;
  return `<button class="tile ${cls||""}" data-go="${go}" style="--d:0s">
      <span class="chip">${icon}</span>
      <span class="name">${name}</span>
      ${meta?`<span class="meta">${meta}</span>`:""}
      ${arrow}
    </button>`;
}
function stagger(html){ // ajoute un délai d'apparition progressif
  let i=0; return html.replace(/--d:0s/g, ()=>`animation-delay:${(i++*0.045).toFixed(3)}s`);
}

function viewHome(){
  const niv = CONFIG.niveaux.map(n=>tile({
     go:`niveau:${n.id}`, icon:I.level, name:n.nom, meta:"Maths · Sciences"
  })).join("");
  const lib = CONFIG.libres.map(l=>{
     const ic = l.id==="archives"?I.archive:I.bank;
     return tile({ go:`libre:${l.id}`, icon:ic, name:l.nom, meta:`${l.liens.length} lien${l.liens.length>1?"s":""}` });
  }).join("");
  return `<div class="grid sections">${stagger(niv+lib)}</div>`;
}

function viewNiveau(){
  const html = CONFIG.matieres.map(m=>{
     const ic = m.id==="sciences"?I.sciences:I.maths;
     return tile({ go:`matiere:${state.niveau}:${m.id}`, icon:ic, name:m.nom, meta:"Cours · QCM · Exos · Vidéos" });
  }).join("");
  return `<div class="grid duo">${stagger(html)}</div>`;
}

function viewMatiere(){
  const html = CONFIG.categories.map(cat=>{
     const n = liensDe(state.niveau,state.matiere,cat.id).length;
     return tile({
        go:`cat:${state.niveau}:${state.matiere}:${cat.id}`,
        cls:`c-${cat.id}`, icon:catIcon[cat.id], name:cat.nom, badge:n
     });
  }).join("");
  return `<div class="grid cats">${stagger(html)}</div>`;
}

function viewCat(){
  const liens = liensDe(state.niveau,state.matiere,state.cat);
  return liens.length ? listHtml(liens, state.cat) : emptyHtml();
}
function viewLibre(){
  const liens = libreDe(state.libre).liens;
  return liens.length ? listHtml(liens, "cours") : emptyHtml();
}

function listHtml(liens, catId){
  const color = {cours:"--cours",qcm:"--qcm",exos:"--exos",videos:"--videos"}[catId]||"--cours";
  const bg    = {cours:"--cours-bg",qcm:"--qcm-bg",exos:"--exos-bg",videos:"--videos-bg"}[catId]||"--cours-bg";
  const rows = liens.map(l=>`
     <a class="link" href="${l.url}" target="_blank" rel="noopener" style="--d:0s">
       <span class="dot" style="background:var(${bg});color:var(${color})">${catIcon[catId]||I.cours}</span>
       <span class="lname">${l.nom}</span>
       <span class="ext">${I.ext}</span>
     </a>`).join("");
  return `<div class="list">${stagger(rows)}</div>`;
}

function emptyHtml(){
  return `<div class="empty">
     <strong>Documents à venir prochainement</strong>
     Le contenu sera ajouté progressivement.
   </div>`;
}

/* ---------- Navigation (délégation de clic) ---------- */
document.addEventListener("click", e=>{
  const el = e.target.closest("[data-go]");
  if(!el) return;
  const parts = el.dataset.go.split(":");
  const t = parts[0];
  if(t==="home")    go({view:"home"});
  else if(t==="niveau")  go({view:"niveau",  niveau:parts[1]});
  else if(t==="matiere") go({view:"matiere", niveau:parts[1], matiere:parts[2]});
  else if(t==="cat")     go({view:"cat",     niveau:parts[1], matiere:parts[2], cat:parts[3]});
  else if(t==="libre")   go({view:"libre",   libre:parts[1]});
});
$("logo").addEventListener("click", ()=>go({view:"home"}));
$("logo").addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" ") go({view:"home"}); });

render();
</script>
</body>
</html>
